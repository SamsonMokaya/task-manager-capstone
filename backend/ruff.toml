# Ruff config (pip + requirements.txt; no pyproject.toml needed).
target-version = "py312"
line-length = 88
src = ["."]

[lint]
select = [
  "E",
  "W",
  "F",
  "I",
  "UP",
  "B",
]
ignore = ["E501"]

[lint.isort]
known-first-party = ["models", "config", "routes", "app"]

[format]
quote-style = "double"
indent-style = "space"
